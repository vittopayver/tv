<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>G-Hub Tv</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }
        body {
            background: #000;
            color: #f1f1f1;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .tv-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        #video-player-tv {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            display: block;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        #video-player-tv.ready { opacity: 1; }

        .tv-click-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3; cursor: pointer;
        }

        /* ── CANAL OVERLAY ── */
        .tv-channels-overlay {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 42vw;
            max-width: 520px;
            min-width: 300px;
            background: rgba(5,15,5,0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            z-index: 10;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            border-right: 2px solid rgba(78,203,0,0.4);
            display: flex; flex-direction: column;
        }
        .tv-channels-overlay.show { transform: translateX(0); }

        .tv-channels-header {
            padding: 30px 26px 18px 26px;
            background: rgba(5,15,5,0.82);
            flex-shrink: 0; position: relative; z-index: 2;
        }
        .tv-channels-header::after {
            content: '';
            position: absolute; bottom: -40px; left: 0; right: 0; height: 40px;
            background: linear-gradient(to bottom, rgba(5,15,5,0.92), transparent);
            pointer-events: none; z-index: 1;
        }

        .tv-header-title-row {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 14px;
        }
        .tv-header-live-dot {
            width: 10px; height: 10px; background: #4ecb00;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(0.8); }
        }
        .tv-header-logo {
            width: 72px; height: 72px;
            object-fit: contain;
            flex-shrink: 0;
            filter: none;
        }
        .tv-channels-title {
            font-size: 2.4rem; font-weight: 700;
            color: #ffffff;
            position: relative; z-index: 3;
        }
        .tv-channels-count {
            background: linear-gradient(135deg, #4ecb00, #1a8c00);
            color: white; padding: 7px 20px; border-radius: 20px;
            font-size: 1.1rem; display: inline-block; position: relative; z-index: 3;
        }

        /* ── LISTA ── */
        .tv-channels-list {
            display: flex; flex-direction: column; gap: 6px;
            padding: 20px 14px 30px; overflow-y: auto; flex: 1;
        }
        .tv-channel-item {
            background: transparent;
            padding: 14px 16px; border-radius: 14px; cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; gap: 16px;
            outline: none;
            border: 2px solid transparent;
            border-left: 4px solid transparent;
        }
        .tv-channel-item:hover {
            background: rgba(78,203,0,0.08);
            transform: translateX(4px);
        }
        .tv-channel-item.active {
            background: rgba(78,203,0,0.12);
            border-left-color: #4ecb00;
        }
        .tv-channel-item.focused {
            background: rgba(78,203,0,0.16);
            border-color: #4ecb00;
            transform: scale(1.02);
            box-shadow: 0 0 22px rgba(78,203,0,0.35);
        }
        .tv-channel-thumb {
            width: 110px; height: 72px; border-radius: 10px;
            background: linear-gradient(135deg, #1a8c00, #4ecb00);
            flex-shrink: 0; position: relative; overflow: hidden;
        }
        .tv-channel-thumb img {
            width: 100%; height: 100%; object-fit: contain; padding: 6px;
        }
        .tv-thumb-placeholder {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30px; font-weight: 700; color: rgba(255,255,255,0.6);
        }
        .tv-channel-info { flex: 1; min-width: 0; }
        .tv-channel-name {
            font-weight: 600; color: #f1f1f1; font-size: 1.15rem; margin-bottom: 6px;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            line-height: 1.35;
        }
        .tv-channel-meta { display: flex; flex-direction: column; gap: 4px; }
        .tv-live-indicator { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #bbb; }
        .tv-live-dot {
            width: 8px; height: 8px; background: #4ecb00;
            border-radius: 50%; animation: tvPulse 2s ease-in-out infinite;
        }
        .tv-channel-cat { font-size: 12px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        @keyframes tvPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        /* ── LOADING ── */
        .tv-loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 2; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .tv-loading-screen.show { opacity: 1; pointer-events: all; }

        .tv-spinner {
            width: 90px; height: 90px;
            border: 6px solid rgba(255,255,255,0.08);
            border-top-color: #4ecb00; border-right-color: #1a8c00;
            border-radius: 50%; animation: tvSpin 0.8s linear infinite;
        }
        @keyframes tvSpin { to { transform: rotate(360deg); } }

        /* ── ERROS ── */
        .tv-error-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease; padding: 20px; text-align: center;
        }
        .tv-error-screen.show { opacity: 1; pointer-events: all; }
        .tv-error-icon  { font-size: 40px; margin-bottom: 12px; }
        .tv-error-title { font-size: 15px; font-weight: 600; color: #f1f1f1; margin-bottom: 6px; }
        .tv-error-sub   { font-size: 12px; color: #888; margin-bottom: 18px; max-width: 260px; line-height: 1.5; }
        .tv-error-btn {
            background: linear-gradient(135deg, #4ecb00, #1a8c00);
            color: #fff; border: none; padding: 10px 28px;
            border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .tv-error-screen.unavail .tv-error-btn { background: #333; color: #ccc; }

        .tv-msg { text-align: center; padding: 25px; font-size: 1.1rem; }
        .tv-msg.loading { color: #888; }
        .tv-msg.error   { color: #4ecb00; }

        .tv-channels-list::-webkit-scrollbar { width: 6px; }
        .tv-channels-list::-webkit-scrollbar-track { background: rgba(5,15,5,0.5); }
        .tv-channels-list::-webkit-scrollbar-thumb { background: rgba(78,203,0,0.5); border-radius: 3px; }
        .tv-channels-list::-webkit-scrollbar-thumb:hover { background: rgba(78,203,0,0.8); }
    </style>
</head>

/* ══ PROTEÇÃO ══════════════════════════════════════════════════════════ */
(function() {
    let pressTimer;
    function exitFullscreenAndGoPortrait() {
        try {
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
        } catch(e) {}
        setTimeout(() => {
            if (screen.orientation && screen.orientation.lock)
                screen.orientation.lock('portrait').catch(() => {});
        }, 100);
    }
    document.addEventListener('mousedown',  () => { pressTimer = setTimeout(exitFullscreenAndGoPortrait, 800); });
    document.addEventListener('mouseup',    () => clearTimeout(pressTimer));
    document.addEventListener('mouseleave', () => clearTimeout(pressTimer));
    document.addEventListener('touchstart', () => { pressTimer = setTimeout(exitFullscreenAndGoPortrait, 800); });
    document.addEventListener('touchend',   () => clearTimeout(pressTimer));
    document.addEventListener('touchcancel',() => clearTimeout(pressTimer));
})();

(function() {
    'use strict';
    const det = () => {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160)
            window.location.reload();
    };
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) { e.preventDefault(); return false; }
        if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) { e.preventDefault(); return false; }
    });
    setInterval(det, 1000);
    document.onselectstart = () => false;
    document.oncopy = () => false;
})();

/* ══ CONFIG ════════════════════════════════════════════════════════════ */
const PLAYLIST_URL = atob('aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3ZpdHRvcGF5dmVyL3R2L3JlZnMvaGVhZHMvbWFpbi9saXN0YS5tM3U4');

/* ══ URL OBFUSCATION ═══════════════════════════════════════════════════ */
const urlProxy = new Map();
let urlCounter = 0;
function obfuscateUrl(url) {
    const t = `__vid_${urlCounter++}_${Math.random().toString(36).substr(2,9)}`;
    urlProxy.set(t, url); return t;
}
function deobfuscateUrl(t) { return urlProxy.get(t) || ''; }

function patchVideoSrc(video) {
    const orig = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src');
    Object.defineProperty(video, 'src', {
        get: () => '[PROTECTED]',
        set(v) { orig.set.call(video, v.startsWith('__vid_') ? deobfuscateUrl(v) : v); },
        configurable: false
    });
    Object.defineProperty(video, 'currentSrc', { get: () => '[PROTECTED]', configurable: false });
}

/* ══ PLAYLIST PARSER ═══════════════════════════════════════════════════ */
function parsePlaylist(data) {
    const lines = data.split('\n');
    const channels = [];
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            const info  = line.substring(8);
            const parts = info.split(',');
            const attrs = parts[0];
            const name  = parts.slice(1).join(',').trim();
            const url   = lines[i+1] ? lines[i+1].trim() : '';
            if (url && !url.startsWith('#')) {
                const lm = attrs.match(/tvg-logo="([^"]*)"/);
                const gm = attrs.match(/group-title="([^"]*)"/);
                channels.push({
                    name, url: obfuscateUrl(url),
                    logo:  lm ? lm[1] : '',
                    group: gm ? gm[1] : ''
                });
            }
        }
    }
    return channels;
}

/* ══ ELEMENTOS ═════════════════════════════════════════════════════════ */
const video        = document.getElementById('video-player-tv');
const loadingScr   = document.getElementById('tv-loading-screen');
const errRetry     = document.getElementById('tv-error-retry');
const errUnavail   = document.getElementById('tv-error-unavail');
const retryBtn     = document.getElementById('tv-retry-btn');
const unavailBtn   = document.getElementById('tv-unavail-btn');
const overlay      = document.getElementById('tv-channels-overlay');
const channelsList = document.getElementById('tv-channels-list');
const channelCount = document.getElementById('tv-channel-count');
const clickOverlay = document.getElementById('tv-click-overlay');

patchVideoSrc(video);

let channels = [], currentIndex = -1, errorCount = 0;
let overlayVisible = false, hideOverlayTmr = null;
let isFirstLoad = true, channelEls = [], focusedIdx = 0;

/* ══ STALL DETECTION ═══════════════════════════════════════════════════ */
const STALL_LIMIT = 20000;
let stallTimer = null;
function clearStall() { if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; } }
function onWait() { if (!stallTimer) stallTimer = setTimeout(triggerError, STALL_LIMIT); }
function rmStall() {
    video.removeEventListener('timeupdate', clearStall);
    video.removeEventListener('playing',    clearStall);
    video.removeEventListener('waiting',    onWait);
    video.removeEventListener('stalled',    onWait);
    video.removeEventListener('error',      triggerError);
}
function addStall() {
    rmStall();
    video.addEventListener('timeupdate', clearStall);
    video.addEventListener('playing',    clearStall);
    video.addEventListener('waiting',    onWait);
    video.addEventListener('stalled',    onWait);
    video.addEventListener('error',      triggerError);
}

function triggerError() {
    clearStall(); rmStall(); loadingScr.classList.remove('show');
    errorCount++;
    if (errorCount === 1) { hideErrors(); errRetry.classList.add('show'); }
    else                  { hideErrors(); errUnavail.classList.add('show'); }
}
function hideErrors() { errRetry.classList.remove('show'); errUnavail.classList.remove('show'); }

/* ══ FULLSCREEN ════════════════════════════════════════════════════════ */
function enterFs() {
    if (window.innerHeight > window.innerWidth) return;
    const e = document.documentElement;
    try {
        if (e.requestFullscreen)       { e.requestFullscreen({ navigationUI: 'hide' }).catch(() => {}); return; }
        if (e.webkitRequestFullscreen) { e.webkitRequestFullscreen(); return; }
        if (e.mozRequestFullScreen)    { e.mozRequestFullScreen(); return; }
        if (e.msRequestFullscreen)     { e.msRequestFullscreen(); return; }
        if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    } catch(err) {}
}
function exitFs() {
    try {
        if (document.exitFullscreen)        document.exitFullscreen().catch(() => {});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.mozCancelFullScreen)  document.mozCancelFullScreen();
        else if (document.msExitFullscreen)     document.msExitFullscreen();
    } catch(e) {}
}
setTimeout(() => { if (window.innerHeight <= window.innerWidth) enterFs(); }, 500);
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange'].forEach(ev => {
    document.addEventListener(ev, () => {
        const inFs = !!(document.fullscreenElement || document.webkitFullscreenElement ||
                        document.mozFullScreenElement || document.msFullscreenElement);
        if (!inFs && window.innerHeight <= window.innerWidth) setTimeout(enterFs, 100);
    });
});

/* ══ SEEK TO LAST MINUTE ═══════════════════════════════════════════════ */
function seekLastMin() {
    return new Promise(res => {
        if (video.duration && isFinite(video.duration)) {
            const t = Math.max(0, video.duration - 60);
            const s = () => { video.removeEventListener('seeked', s); res(); };
            video.addEventListener('seeked', s);
            video.currentTime = t;
        } else res();
    });
}
video.addEventListener('loadedmetadata', () => seekLastMin());
video.addEventListener('ended', () => { if (currentIndex === 0) { video.currentTime = 0; video.play(); } });

/* ══ OVERLAY ═══════════════════════════════════════════════════════════ */
function showOverlayInitial() {
    overlayVisible = true; overlay.classList.add('show');
    hideOverlayTmr = setTimeout(hideOverlay, 5000);
}
function toggleOverlay() {
    if (hideOverlayTmr) { clearTimeout(hideOverlayTmr); hideOverlayTmr = null; }
    overlayVisible = !overlayVisible;
    if (overlayVisible) {
        overlay.classList.add('show');
        if (currentIndex >= 0 && channelEls.length > 0) { focusedIdx = currentIndex; updateFocus(); }
    } else {
        overlay.classList.remove('show');
    }
}
function hideOverlay() { overlayVisible = false; overlay.classList.remove('show'); }
function updateFocus() {
    channelEls.forEach((el, i) => {
        el.classList.remove('focused');
        if (i === focusedIdx) { el.classList.add('focused'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    });
}

clickOverlay.addEventListener('click', toggleOverlay);
overlay.addEventListener('click', e => e.stopPropagation());
retryBtn.addEventListener('click',   e => { e.stopPropagation(); if (currentIndex >= 0) playChannel(currentIndex, true); });
unavailBtn.addEventListener('click', e => { e.stopPropagation(); hideErrors(); });

/* ══ KEYBOARD ══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
    if (['Escape','Back','Backspace'].includes(e.key)) {
        e.preventDefault();
        if (overlayVisible) hideOverlay(); else exitFs();
        return;
    }
    if (['Enter','OK'].includes(e.key) && !overlayVisible) { e.preventDefault(); toggleOverlay(); return; }
    if (!overlayVisible && channelEls.length > 0) {
        if (['ArrowDown','Down'].includes(e.key)) { e.preventDefault(); playChannel(currentIndex + 1 < channels.length ? currentIndex + 1 : 0); return; }
        if (['ArrowUp','Up'].includes(e.key))     { e.preventDefault(); playChannel(currentIndex - 1 >= 0 ? currentIndex - 1 : channels.length - 1); return; }
    }
    if (overlayVisible && channelEls.length > 0) {
        if (['ArrowDown','Down'].includes(e.key))  { e.preventDefault(); focusedIdx = Math.min(focusedIdx + 1, channelEls.length - 1); updateFocus(); }
        else if (['ArrowUp','Up'].includes(e.key)) { e.preventDefault(); focusedIdx = Math.max(focusedIdx - 1, 0); updateFocus(); }
        else if (['Enter','OK'].includes(e.key))   { e.preventDefault(); playChannel(focusedIdx); hideOverlay(); }
    }
});



/* ══ PLAY ENGINE — multi-engine com fallback ═══════════════════════════
   Ordem: HLS.js → mpegts.js → Shaka Player → dash.js → HTML5 nativo
   Igual à lógica do código de referência (pasted_text).
═══════════════════════════════════════════════════════════════════════ */
let activeHls    = null;
let activeMpegts = null;
let activeShaka  = null;
let activeDash   = null;

function destroyEngines() {
    if (activeHls)    { try { activeHls.destroy();    } catch(e) {} activeHls    = null; }
    if (activeMpegts) { try { activeMpegts.destroy(); } catch(e) {} activeMpegts = null; }
    if (activeShaka)  { try { activeShaka.destroy();  } catch(e) {} activeShaka  = null; }
    if (activeDash)   { try { activeDash.reset();     } catch(e) {} activeDash   = null; }
}

function waitForEngines(cb) {
    const needed = ['Hls', 'mpegts', 'shaka', 'dashjs'];
    let tries = 0;
    const check = () => {
        if (needed.every(n => window[n] !== undefined) || tries > 30) { cb(); return; }
        tries++;
        setTimeout(check, 200);
    };
    check();
}

function loadMediaUrl(url, onSuccess, onFail) {
    destroyEngines();
    video.classList.remove('ready');
    loadingScr.classList.add('show');

    const isHLS  = /\.m3u8(\?|$)/i.test(url);
    const isDASH = /\.mpd(\?|$)/i.test(url);
    const isFLV  = /\.flv(\?|$)/i.test(url);
    const isTS   = /\.ts(\?|$)/i.test(url) || /\/stream/i.test(url);

    function onReady() {
        seekLastMin().then(() => {
            setTimeout(() => {
                loadingScr.classList.remove('show');
                video.classList.add('ready');
                if (window.innerHeight <= window.innerWidth) enterFs();
                video.muted = false; video.volume = 1; video.play().catch(() => {});
                if (isFirstLoad) { isFirstLoad = false; showOverlayInitial(); }
                addStall();
                if (onSuccess) onSuccess();
            }, 50);
        });
    }

    function tryHLS() {
        if (typeof Hls !== 'undefined' && Hls.isSupported() && (isHLS || !isDASH && !isFLV && !isTS)) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 0,
                liveBackBufferLength: 0,
                maxBufferLength: 8,
                maxMaxBufferLength: 16,
                liveSyncDurationCount: 2,
                liveMaxLatencyDurationCount: 4,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 10000,
                fragLoadingTimeOut: 20000
            });
            activeHls = hls;
            hls.loadSource(url);
            hls.attachMedia(video);
            let resolved = false;
            hls.on(Hls.Events.MANIFEST_PARSED, () => { resolved = true; onReady(); });
            hls.on(Hls.Events.ERROR, (ev, data) => {
                if (!resolved && data.fatal) { hls.destroy(); activeHls = null; tryMpegts(); }
            });
            return;
        }
        tryMpegts();
    }

    function tryMpegts() {
        if (typeof mpegts !== 'undefined' && mpegts.isSupported() && (isFLV || isTS)) {
            const type = isFLV ? 'flv' : 'mpegts';
            const player = mpegts.createPlayer({ type, url, isLive: true }, {
                enableWorker: true, lazyLoadMaxDuration: 5, liveBufferLatencyChasing: true
            });
            activeMpegts = player;
            player.attachMediaElement(video);
            player.load();
            let resolved = false;
            video.addEventListener('canplay', function onCan() {
                video.removeEventListener('canplay', onCan);
                resolved = true; onReady();
            });
            player.on(mpegts.Events.ERROR, () => {
                if (!resolved) { player.destroy(); activeMpegts = null; tryShaka(); }
            });
            return;
        }
        tryShaka();
    }

    function tryShaka() {
        if (typeof shaka !== 'undefined' && (isDASH || isHLS)) {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) { tryDash(); return; }
            const player = new shaka.Player(video);
            activeShaka = player;
            player.configure({ streaming: { bufferingGoal: 10, rebufferingGoal: 2, bufferBehind: 5 } });
            let resolved = false;
            player.load(url).then(() => { resolved = true; onReady(); }).catch(() => {
                if (!resolved) { player.destroy(); activeShaka = null; tryDash(); }
            });
            return;
        }
        tryDash();
    }

    function tryDash() {
        if (typeof dashjs !== 'undefined' && isDASH) {
            const player = dashjs.MediaPlayer().create();
            activeDash = player;
            player.initialize(video, url, false);
            player.updateSettings({ streaming: { delay: { liveDelay: 2 }, liveCatchup: { enabled: true } } });
            let resolved = false;
            video.addEventListener('canplay', function onCan() {
                video.removeEventListener('canplay', onCan);
                resolved = true; onReady();
            });
            setTimeout(() => { if (!resolved) { player.reset(); activeDash = null; tryNative(); } }, 10000);
            return;
        }
        tryNative();
    }

    function tryNative() {
        video.src = url;
        video.load();
        let resolved = false;
        const onCan = () => { cleanup(); resolved = true; onReady(); };
        const onErr = () => { cleanup(); if (!resolved && onFail) onFail(); else if (!resolved) triggerError(); };
        const loadTmr = setTimeout(() => {
            if (!resolved) { cleanup(); if (onFail) onFail(); else triggerError(); }
        }, 15000);
        function cleanup() { clearTimeout(loadTmr); video.removeEventListener('canplay', onCan); video.removeEventListener('error', onErr); }
        video.addEventListener('canplay', onCan);
        video.addEventListener('error',   onErr);
    }

    waitForEngines(tryHLS);
}

/* ══ PLAY CHANNEL ══════════════════════════════════════════════════════ */
function playChannel(index, isRetry) {
    if (index < 0 || index >= channels.length) return;
    clearStall(); rmStall();
    if (!isRetry) errorCount = 0;
    hideErrors();
    channelEls.forEach((el, i) => el.classList.toggle('active', i === index));
    currentIndex = index;
    const ch = channels[index];
    const rawUrl = deobfuscateUrl(ch.url);
    loadMediaUrl(rawUrl, null, () => { errorCount++; triggerError(); });
}

/* ══ RENDER CHANNELS ═══════════════════════════════════════════════════ */
function renderChannels(channels_) {
    channelsList.innerHTML = '';
    channelEls = [];
    channelCount.textContent = `${channels_.length} | Canais Disponíveis`;
    channels_.forEach((ch, idx) => {
        const el = document.createElement('div');
        el.className = 'tv-channel-item';
        el.setAttribute('tabindex', '0');
        el.innerHTML = `
            <div class="tv-channel-thumb">
                ${ch.logo
                    ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none'">`
                    : `<div class="tv-thumb-placeholder">${ch.name.charAt(0)}</div>`}
            </div>
            <div class="tv-channel-info">
                <div class="tv-channel-name">${ch.name}</div>
                <div class="tv-channel-meta">
                    <div class="tv-live-indicator"><div class="tv-live-dot"></div><span>Ao vivo</span></div>
                    <div class="tv-channel-cat">${ch.group || 'Geral'}</div>
                </div>
            </div>`;
        el.addEventListener('click', e => { e.stopPropagation(); playChannel(idx); hideOverlay(); });
        channelsList.appendChild(el);
        channelEls.push(el);
    });
    if (channels_.length > 0) playChannel(0);
    focusedIdx = 0;
}

/* ══ FETCH PLAYLIST ════════════════════════════════════════════════════ */
fetch(PLAYLIST_URL)
    .then(r => r.text())
    .then(data => {
        const remote = parsePlaylist(data);
        // Mescla: extras no topo, depois os da playlist
        channels = remote;
        if (channels.length === 0) {
            channelsList.innerHTML = '<div class="tv-msg error">Nenhum canal encontrado</div>';
            loadingScr.classList.remove('show');
            return;
        }
        renderChannels(channels);
    })
    .catch(() => {
        channelsList.innerHTML = '<div class="tv-msg error">Erro ao carregar playlist</div>';
        loadingScr.classList.remove('show');
    });
</script>
