<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Hub Tv</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{background:#000;overflow:hidden;width:100%;height:100%;}

        #vid{
            position:fixed;top:0;left:0;width:100%;height:100%;
            object-fit:contain;background:#000;z-index:1;
        }

        #sp{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:#000;z-index:50;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
        }
        #sp.off{display:none;}
        .ring{
            width:72px;height:72px;
            border:5px solid rgba(255,255,255,.08);
            border-top-color:#4ecb00;border-right-color:#1a8c00;
            border-radius:50%;animation:spin .75s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        #sp-txt{color:#555;font:13px sans-serif;text-align:center;padding:0 24px;line-height:1.7;}

        /* OSD */
        #osd{
            position:fixed;bottom:48px;right:48px;z-index:60;
            display:none;flex-direction:column;align-items:flex-end;gap:8px;
        }
        #osd.on{display:flex;}
        .osd-live{
            display:flex;align-items:center;gap:6px;
            background:rgba(0,0,0,.7);border:1px solid rgba(78,203,0,.5);
            border-radius:20px;padding:4px 12px 4px 9px;
            font:700 11px/1 sans-serif;letter-spacing:1.2px;color:#4ecb00;text-transform:uppercase;
        }
        .osd-dot{width:8px;height:8px;background:#4ecb00;border-radius:50%;animation:p 1.4s ease-in-out infinite;}
        @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
        .osd-num{font:900 5rem/1 sans-serif;color:#fff;letter-spacing:-3px;
            text-shadow:0 0 40px rgba(78,203,0,.4),0 2px 20px rgba(0,0,0,.95);}
        .osd-nm{font:500 .9rem/1 sans-serif;color:rgba(255,255,255,.5);max-width:260px;
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

        #bar{position:fixed;bottom:0;left:0;right:0;height:2px;
            background:linear-gradient(to right,#4ecb00,#1a8c00);z-index:10;display:none;}
        #bar.on{display:block;}

        #click-ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;}
    </style>
</head>
<body>

<video id="vid" preload="auto" playsinline webkit-playsinline muted></video>
<div id="sp"><div class="ring"></div><div id="sp-txt">Procurando canais…</div></div>
<div id="osd">
    <div class="osd-live"><div class="osd-dot"></div>AO VIVO</div>
    <div class="osd-num" id="osd-n">1</div>
    <div class="osd-nm"  id="osd-nm">Canal 1</div>
</div>
<div id="bar"></div>
<div id="click-ov"></div>

<script>
var vid    = document.getElementById('vid');
var sp     = document.getElementById('sp');
var spTxt  = document.getElementById('sp-txt');
var osd    = document.getElementById('osd');
var osdN   = document.getElementById('osd-n');
var osdNm  = document.getElementById('osd-nm');
var bar    = document.getElementById('bar');
var clickOv= document.getElementById('click-ov');

var channels = [];
var curIdx   = -1;
var osdTmr   = null;
var mpPlayer = null;

/* ── Proxy CORS: envolve URL http:// para evitar Mixed Content ──────
   Usa allorigins.win como proxy público.
   Formato: https://api.allorigins.win/raw?url=<URL_ENCODED>
   Para streams MPEG-TS não funciona por ser binário —
   usamos corsproxy.io que faz proxy transparente de bytes.
   Fallback: tentativa direta (funciona se página for http://).      */
var PROXIES = [
    'https://corsproxy.io/?',          /* proxy 1 */
    'https://api.codetabs.com/v1/proxy?quest=', /* proxy 2 */
];

function proxiedUrl(rawUrl, proxyIndex) {
    if (proxyIndex === undefined) proxyIndex = 0;
    if (proxyIndex >= PROXIES.length) return rawUrl; /* sem proxy — direto */
    return PROXIES[proxyIndex] + encodeURIComponent(rawUrl);
}

/* ── spinner ──────────────────────────────────────────────────────── */
function spOff(){ sp.classList.add('off'); }

/* ── OSD ──────────────────────────────────────────────────────────── */
function showOSD(i){
    osdN.textContent  = i+1;
    osdNm.textContent = (channels[i]&&channels[i].name)||('Canal '+(i+1));
    osd.classList.add('on');
    if(osdTmr) clearTimeout(osdTmr);
    osdTmr = setTimeout(function(){ osd.classList.remove('on'); }, 3500);
}

/* ── fullscreen ───────────────────────────────────────────────────── */
function enterFs(){
    var e=document.documentElement;
    try{
        if(e.requestFullscreen)       {e.requestFullscreen({navigationUI:'hide'}).catch(function(){});return;}
        if(e.webkitRequestFullscreen) {e.webkitRequestFullscreen();return;}
        if(vid.webkitEnterFullscreen) vid.webkitEnterFullscreen();
    }catch(ex){}
}
function exitFs(){
    try{
        if(document.exitFullscreen)            document.exitFullscreen().catch(function(){});
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
    }catch(e){}
}
setTimeout(enterFs,600);
['fullscreenchange','webkitfullscreenchange'].forEach(function(ev){
    document.addEventListener(ev,function(){
        var inFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
        if(!inFs) setTimeout(enterFs,200);
    });
});

/* ── wake lock ────────────────────────────────────────────────────── */
var wl=null;
function keepAwake(){
    try{
        if(navigator.wakeLock&&document.visibilityState==='visible'&&!(wl&&!wl.released)){
            navigator.wakeLock.request('screen').then(function(w){
                wl=w;w.addEventListener('release',function(){wl=null;keepAwake();});
            }).catch(function(){});
        }
    }catch(e){}
}
keepAwake();
document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'){keepAwake();if(vid.paused&&curIdx>=0)vid.play().catch(function(){});}
});

/* ── destroy player ───────────────────────────────────────────────── */
function destroyMp(){
    if(mpPlayer){
        try{mpPlayer.pause();mpPlayer.unload();mpPlayer.detachMediaElement();mpPlayer.destroy();}catch(e){}
        mpPlayer=null;
    }
}

/* ── playUrl com fallback de proxy ───────────────────────────────── */
function playUrl(rawUrl, proxyIdx){
    if(proxyIdx === undefined) proxyIdx = 0;
    destroyMp();

    /* tenta direto se página for http, senão usa proxy */
    var pageIsHttp = location.protocol === 'http:';
    var useUrl = pageIsHttp ? rawUrl : proxiedUrl(rawUrl, proxyIdx);

    spTxt.textContent = 'Conectando' + (proxyIdx > 0 ? ' (proxy '+(proxyIdx)+')' : '') + '…';

    mpPlayer = mpegts.createPlayer(
        {type:'mpegts', url:useUrl, isLive:true, hasAudio:true, hasVideo:true},
        {enableWorker:true, lazyLoad:false, liveBufferLatencyChasing:true,
         cors:true, withCredentials:false}
    );

    /* se der erro de rede, tenta próximo proxy */
    mpPlayer.on(mpegts.Events.ERROR, function(type){
        if(type === mpegts.ErrorTypes.NETWORK_ERROR || type === mpegts.ErrorTypes.MEDIA_ERROR){
            var next = proxyIdx + 1;
            if(next <= PROXIES.length){
                destroyMp();
                playUrl(rawUrl, next);
            } else {
                spTxt.textContent = 'Canal indisponível. Use ↑↓ para trocar.';
            }
        }
    });

    mpPlayer.attachMediaElement(vid);
    mpPlayer.load();

    vid.muted  = true;
    vid.volume = 1;
    vid.play().catch(function(){});
}

/* ── eventos do vídeo ─────────────────────────────────────────────── */
vid.addEventListener('playing', function(){
    spOff();
    bar.classList.add('on');
    setTimeout(function(){ vid.muted=false; vid.volume=1; }, 300);
    keepAwake();
});

vid.addEventListener('error', function(){
    /* erro no elemento <video> — Mixed Content costuma aparecer aqui */
    if(curIdx >= 0 && channels[curIdx]){
        var raw = channels[curIdx].rawUrl;
        var curProxy = channels[curIdx].proxyIdx || 0;
        var next = curProxy + 1;
        if(next <= PROXIES.length){
            channels[curIdx].proxyIdx = next;
            destroyMp();
            playUrl(raw, next);
        }
    }
});

/* ── teclado / controle ───────────────────────────────────────────── */
document.addEventListener('keydown',function(e){
    if(['Escape','Back','Backspace'].includes(e.key)){e.preventDefault();exitFs();return;}
    if(['ArrowDown','Down','ChannelDown'].includes(e.key)){
        e.preventDefault();
        playChannel((curIdx+1)%Math.max(channels.length,1));return;
    }
    if(['ArrowUp','Up','ChannelUp'].includes(e.key)){
        e.preventDefault();
        playChannel((curIdx-1+Math.max(channels.length,1))%Math.max(channels.length,1));return;
    }
    if(['Enter','OK'].includes(e.key)){e.preventDefault();if(curIdx>=0)playChannel(curIdx);}
});
clickOv.addEventListener('click',function(){ if(curIdx>=0) showOSD(curIdx); });

function playChannel(i){
    if(!channels.length) return;
    if(i<0) i=channels.length-1;
    if(i>=channels.length) i=0;
    curIdx=i;
    showOSD(i);
    playUrl(channels[i].rawUrl, 0);
}

/* ── SCAN ─────────────────────────────────────────────────────────── */
function testPort(port){
    var url='http://46.151.196.223:'+port+'/';
    return new Promise(function(resolve){
        var ctrl=new AbortController();
        var tid=setTimeout(function(){ctrl.abort();resolve(null);},2000);
        fetch(url,{method:'HEAD',signal:ctrl.signal,mode:'no-cors',cache:'no-store'})
            .then(function(){clearTimeout(tid);resolve(url);})
            .catch(function(){clearTimeout(tid);resolve(null);});
    });
}

async function scan(){
    var batch=30, found=false;
    for(var p=14000; p<=14999; p+=batch){
        var ports=[];
        for(var q=p; q<p+batch&&q<=14999; q++) ports.push(q);
        var res = await Promise.all(ports.map(testPort));
        res.forEach(function(url){
            if(!url) return;
            channels.push({name:'Canal '+(channels.length+1), rawUrl:url, proxyIdx:0});
            if(!found){
                found=true;
                curIdx=0;
                spOff();
                showOSD(0);
                playUrl(url, 0);
            }
        });
    }
    if(!found){
        spTxt.textContent='Nenhum canal encontrado.\nVerifique a conexão.';
    }
}

scan();
</script>
</body>
</html>
